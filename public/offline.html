
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Career Leap</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
      background-color: #f9fafb;
      color: #111827;
    }
    
    .container {
      max-width: 500px;
      padding: 40px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #111827;
    }
    
    p {
      margin-bottom: 1.5rem;
      color: #4b5563;
      line-height: 1.6;
    }
    
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .button {
      display: inline-block;
      background-color: #7c46ff;
      color: white;
      padding: 0.7rem 1.2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    
    .button:hover {
      background-color: #6535cc;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0f172a;
        color: #f9fafb;
      }
      
      .container {
        background-color: #1e293b;
      }
      
      h1 {
        color: #f9fafb;
      }
      
      p {
        color: #d1d5db;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>You're offline</h1>
    <p>You appear to be offline. Please check your internet connection and try again.</p>
    <p>Career Leap needs an internet connection to provide the latest AI-powered career recommendations.</p>
    <a href="/" class="button">Try Again</a>
  </div>
</body>
</html>
